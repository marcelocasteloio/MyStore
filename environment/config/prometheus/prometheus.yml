global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['mcio-postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['mcio-redis-exporter:9121']
        
  - job_name: 'mongo-exporter'
    static_configs:
      - targets: ['mcio-mongo-exporter:9216']